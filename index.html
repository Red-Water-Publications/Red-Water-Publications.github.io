<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        
        header {
            background-color: #cc0e00;
            color: white;
            padding: 10px 0;
            text-align: center;
            z-index: 1000;
        }
        
        main {
            padding: 20px;
            margin-left: 260px;
            margin-top: 60px;
        }
        
        footer {
            background-color: #cc0e00;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        
        .sidebar {
            height: 100%;
            width: 250px;
            position: fixed;
            top: 98px;
            left: 0;
            background-color: #111;
            padding-top: 20px;
            padding-left: 10px;
        }
        
        .sidebar a {
            font-family: 'Roboto', sans-serif;
            padding: 8px 8px 8px 16px;
            text-decoration: none;
            font-size: 18px;
            color: white;
            display: block;
        }
        
        .sidebar a:hover {
            background-color: #575757;
            color: white;
        }
        
        .sidebar h2 {
            font-family: 'Roboto', sans-serif;
            color: white;
        }
    </style>
</head>

<body>
    <header>
        <h1>Red Water Publications</h1>
    </header>
    <main>
        <div class="sidebar">
            <h2>Sidebar</h2>
            <a href="#">Link 1</a>
            <a href="#">Link 2</a>
            <a href="#">Link 3</a>
            <a href="#">Link 4</a>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 Justin</p>
    </footer>
</body>

</html>
